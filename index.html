<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jelly Jump</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #f07eb0;
    touch-action: none;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Nunito', sans-serif;
  }

  #wrapper { position: relative; }

  canvas { display: block; }

  #ui-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
  }

  #score-display {
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    color: #e8176a;
    font-family: 'Pacifico', cursive;
    font-size: 26px;
    text-shadow: 0 3px 0 rgba(255,255,255,0.6);
    pointer-events: none;
  }

  #start-screen {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: all;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 40%, #ffcce5 0%, #f9a8c9 55%, #f07eb0 100%);
    background-image: url('images/bg.png');
    background-size: cover;
    background-position: center;
  }

  #start-screen::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.45;
    background-image:
      radial-gradient(circle at 15% 15%, rgba(255,255,255,0.45) 0 35px, transparent 36px),
      radial-gradient(circle at 85% 18%, rgba(255,255,255,0.35) 0 55px, transparent 56px),
      radial-gradient(circle at 25% 78%, rgba(255,255,255,0.3) 0 28px, transparent 29px),
      radial-gradient(circle at 80% 85%, rgba(255,255,255,0.35) 0 70px, transparent 71px);
  }

  .bubble-layer { position: absolute; inset: 0; pointer-events: none; }

  .bubble {
    position: absolute;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.22;
  }

  .pink { background-image: url('images/decorations/bubble-1.png'); }
  .blue { background-image: url('images/decorations/bubble-2.png'); }

  .b1 { width: 260px; height: 260px; top: -2%; left: -8%; }
  .b2 { width: 320px; height: 320px; top: -6%; right: -10%; }
  .b3 { width: 220px; height: 220px; bottom: 12%; left: -6%; }
  .b4 { width: 280px; height: 280px; bottom: -4%; right: -8%; }
  .b5 { width: 180px; height: 180px; top: 38%; left: -4%; }
  .b6 { width: 210px; height: 210px; top: 45%; right: -6%; }
  .b7 { width: 150px; height: 150px; top: 24%; left: 72%; }
  .b8 { width: 170px; height: 170px; bottom: 32%; right: 68%; }

  .candy {
    position: absolute;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    pointer-events: none;
    z-index: 2;
  }

  .worm {
    width: 520px; height: 220px;
    top: -2%; left: 50%; margin-left: -260px;
    background-image: url('images/decorations/worm.png');
    transform: rotate(-4deg);
  }

  .bear {
    width: 360px; height: 440px;
    bottom: -30%; right: -30%;
    background-image: url('images/decorations/bear-yellow.png');
    transform: rotate(8deg);
  }

  .heart {
    width: 230px; height: 230px;
    left: -16%; bottom: 24%;
    background-image: url('images/decorations/heart.png');
    transform: rotate(-12deg);
  }

  .logo-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    margin-bottom: 10px;
    opacity: 0;
    transform: scale(0.6) translateY(20px);
    animation: popIn 0.7s cubic-bezier(.34,1.56,.64,1) 0.2s forwards;
    z-index: 10;
  }

  .logo-img {
    width: 260px;
    max-width: 85%;
    display: block;
    filter: drop-shadow(0 8px 18px rgba(200,20,80,0.25));
  }

  .hint-text {
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #2d1a26;
    text-transform: uppercase;
    margin: 28px 0 32px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.85s forwards;
    z-index: 10;
  }

  .play-btn {
    background: #fff;
    border: none;
    border-radius: 50px;
    color: #2d1a26;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 14px 54px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    transition: transform 0.12s, box-shadow 0.12s;
    pointer-events: all;
    opacity: 0;
    animation: fadeUp 0.5s ease 1.0s forwards;
    z-index: 10;
  }
  .play-btn:hover  { transform: scale(1.06); box-shadow: 0 8px 28px rgba(0,0,0,0.18); }
  .play-btn:active { transform: scale(0.96); }

  #over-screen {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at 50% 40%, #ffcce5 0%, #f9a8c9 55%, #f07eb0 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: all;
  }
  #over-screen h1 {
    font-family: 'Pacifico', cursive;
    font-size: 40px;
    color: #e8176a;
    text-shadow: 0 4px 0 #c0104f;
    margin-bottom: 8px;
  }
  #final-score {
    font-family: 'Pacifico', cursive;
    font-size: 64px;
    color: #e8176a;
    text-shadow: 0 6px 0 #c0104f, 0 10px 24px rgba(200,20,80,0.25);
    margin: 4px 0;
  }
  #best-score {
    font-size: 16px;
    font-weight: 800;
    color: #2d1a26;
    opacity: 0.7;
    margin-bottom: 32px;
  }

  .btn {
    background: #fff;
    border: none;
    border-radius: 50px;
    color: #2d1a26;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 14px 54px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    transition: transform 0.12s, box-shadow 0.12s;
    pointer-events: all;
  }
  .btn:hover  { transform: scale(1.06); box-shadow: 0 8px 28px rgba(0,0,0,0.18); }
  .btn:active { transform: scale(0.96); }

  @keyframes popIn {
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c"></canvas>

  <div id="ui-overlay">
    <div id="score-display" class="hidden">0</div>

    <div id="start-screen">
      <div class="bubble-layer">
        <div class="bubble pink b1"></div>
        <div class="bubble blue b2"></div>
        <div class="bubble pink b3"></div>
        <div class="bubble blue b4"></div>
        <div class="bubble pink b5"></div>
        <div class="bubble blue b6"></div>
        <div class="bubble pink b7"></div>
        <div class="bubble blue b8"></div>
      </div>
      <div class="candy worm"></div>
      <div class="candy bear"></div>
      <div class="candy heart"></div>
      <div class="logo-wrap">
        <img src="images/logo.png" class="logo-img" alt="Jelly Jump Logo">
      </div>
      <p class="hint-text">Hold and move</p>
      <button class="play-btn" onclick="startGame()">PLAY</button>
    </div>

    <div id="over-screen" class="hidden">
      <h1>Game Over!</h1>
      <p id="final-score">0</p>
      <p id="best-score">Score: 0</p>
      <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// RESPONSIVE CANVAS SETUP
// ═══════════════════════════════════════════
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const wrapper = document.getElementById('wrapper');
const W = 400, H = 700;

canvas.width  = W;
canvas.height = H;

function resizeGame() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  let scale = Math.min(vw / W, vh / H);
  const displayW = Math.round(W * scale);
  const displayH = Math.round(H * scale);

  wrapper.style.width  = displayW + 'px';
  wrapper.style.height = displayH + 'px';
  canvas.style.width   = displayW + 'px';
  canvas.style.height  = displayH + 'px';

  const isFull = displayW >= vw && displayH >= vh;
  canvas.style.borderRadius  = isFull ? '0' : '28px';
  wrapper.style.borderRadius = canvas.style.borderRadius;

  canvasScale = scale;
}

let canvasScale = 1;
resizeGame();
window.addEventListener('resize', resizeGame);
window.addEventListener('orientationchange', () => { setTimeout(resizeGame, 200); });

// ═══════════════════════════════════════════
// IMAGES
// ═══════════════════════════════════════════
function loadImg(src) {
  const img = new Image();
  img.src = src;
  return img;
}

const pandaImg      = loadImg('images/panda.PNG');
const blockImg      = loadImg('images/block.png');
const blockMoveImg  = loadImg('images/block-move.png');
const blockBreakImg = loadImg('images/block-break.png');
const bgImg         = loadImg('images/bg.png');

function getPlatformImg(type) {
  if (type === 'move'  && blockMoveImg.complete  && blockMoveImg.naturalWidth)  return blockMoveImg;
  if (type === 'break' && blockBreakImg.complete && blockBreakImg.naturalWidth) return blockBreakImg;
  if (blockImg.complete && blockImg.naturalWidth) return blockImg;
  return null;
}

// ═══════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════
let AC = null;
function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  return AC;
}

let musicAudio = null, musicRunning = false;

function startMusic() {
  if (musicRunning) return;
  musicRunning = true;
  const audio = new Audio('audio/music.mp3');
  audio.loop = true; audio.volume = 0.45;
  audio.play().then(() => { musicAudio = audio; }).catch(() => { musicAudio = null; _startSynthMusic(); });
}

function stopMusic() {
  musicRunning = false;
  if (musicAudio) { musicAudio.pause(); musicAudio.currentTime = 0; musicAudio = null; }
  _stopSynthMusic();
}

let synthNodes = [], synthTimer = null;

function _startSynthMusic() {
  if (!musicRunning) return;
  _scheduleSynth(getAC().currentTime + 0.05);
}

function _scheduleSynth(startTime) {
  const ac = getAC();
  const bpm = 132, beat = 60 / bpm, loopLen = 16 * beat;
  const master = ac.createGain(); master.gain.value = 0.13; master.connect(ac.destination);
  const melody = [
    [523,0,1],[659,1,1],[784,2,1],[1047,3,1],
    [880,4,1],[784,5,1],[659,6,1],[523,7,1],
    [659,8,1],[784,9,1],[880,10,1],[1047,11,1],
    [784,12,1],[659,13,1],[523,14,2],
  ];
  melody.forEach(([freq, sb, db]) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.value = freq; o.connect(g); g.connect(master);
    const t = startTime + sb*beat, d = db*beat*0.75;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.7,t+0.02); g.gain.exponentialRampToValueAtTime(0.01,t+d);
    o.start(t); o.stop(t+d+0.05); synthNodes.push(o);
  });
  for (let b = 0; b < 16; b += 2) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.value = 130; o.connect(g); g.connect(master);
    const t = startTime + b*beat;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.4,t+0.03); g.gain.exponentialRampToValueAtTime(0.01,t+beat*0.6);
    o.start(t); o.stop(t+beat); synthNodes.push(o);
  }
  synthTimer = setTimeout(() => { if (musicRunning) _scheduleSynth(ac.currentTime); }, (loopLen-0.4)*1000);
}

function _stopSynthMusic() {
  clearTimeout(synthTimer);
  synthNodes.forEach(n => { try { n.stop(); } catch(e){} });
  synthNodes = [];
}

let popBuffer = null;
fetch('audio/pop.mp3')
  .then(r => r.arrayBuffer())
  .then(buf => getAC().decodeAudioData(buf))
  .then(decoded => { popBuffer = decoded; })
  .catch(() => { popBuffer = null; });

function playPop() {
  const ac = getAC();
  if (popBuffer) {
    const src = ac.createBufferSource();
    src.buffer = popBuffer; src.connect(ac.destination); src.start();
    return;
  }
  const osc = ac.createOscillator(), g = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(420, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(820, ac.currentTime + 0.07);
  g.gain.setValueAtTime(0.4, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.13);
  osc.connect(g); g.connect(ac.destination);
  osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.14);
}

// ═══════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════
let state   = 'start';
let score   = 0, best = 0;
let scrollY = 0;
let platforms = [], player = {};
let keys = { left: false, right: false };
let animId;

const GRAVITY    = 0.35;
const JUMP_VEL   = -11;
const PLAYER_W   = 90;
const PLAYER_H   = 90;
const PLAT_W     = 100;
const PLAT_H     = 22;
const PLAT_COUNT = 5;
const SPEED_X    = 4;
const MAX_GAP    = 55;
const BREAK_DELAY = 18;

// ═══════════════════════════════════════════
// PLATFORMS
// ═══════════════════════════════════════════
function makePlatform(x, y, type) {
  return {
    x, y, w: PLAT_W, h: PLAT_H,
    type: type || 'normal',
    vx: (type === 'move') ? (Math.random() > .5 ? 1.4 : -1.4) : 0,
    broken: false,
    breakAnim: 0,
    alpha: 1,
    breakTimer: 0  
  };
}

function generatePlatforms() {
  platforms = [];
  platforms.push({ x:W/2-50, y:H-80, w:100, h:PLAT_H, type:'normal', vx:0, broken:false, breakAnim:0, alpha:1, breakTimer:0 });
  let lastY = H - 80;
  while (lastY > - -100) {
    lastY -= 50 + Math.random() * MAX_GAP;
    spawnPlatformAt(lastY);
  }
}

function spawnPlatformAt(y) {
  const r = Math.random();
  let type = 'normal';
  const lastPlatform = platforms[platforms.length - 1];
  if (score > 300 && r > 0.75) type = 'move';
  if (score > 600 && r > 0.88) type = 'break';
  if (lastPlatform && lastPlatform.type === 'break' && type === 'break') type = 'normal';
  if (lastPlatform && lastPlatform.type === 'move'  && type === 'break') type = 'normal';
  platforms.push(makePlatform(Math.random() * (W - PLAT_W), y, type));
}

function initPlayer() {
  player  = { x:W/2-PLAYER_W/2, y:H-80-PLAYER_H, vx:0, vy:JUMP_VEL, dir:1 };
  scrollY = 0; score = 0;
}

// ═══════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════
function drawBg() {
  if (bgImg.complete && bgImg.naturalWidth) {
    ctx.drawImage(bgImg, 0, 0, W, H);
  } else {
    const g = ctx.createRadialGradient(W/2, H*0.4, 0, W/2, H*0.4, H*0.85);
    g.addColorStop(0, '#ffcce5'); g.addColorStop(0.55, '#f9a8c9'); g.addColorStop(1, '#f07eb0');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }
}

function drawPlatform(p) {
  if (p.broken && p.breakAnim >= 1) return;
  ctx.save();
  ctx.globalAlpha = p.alpha;
  const img = getPlatformImg(p.type);
  if (img) {
    ctx.drawImage(img, p.x, p.y, p.w, p.h);
  } else {
    ctx.fillStyle = p.type==='normal' ? '#e8176a' : p.type==='move' ? '#5dd9b0' : '#9b59b6';
    ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 8); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath(); ctx.roundRect(p.x+4, p.y+3, p.w-8, 5, 3); ctx.fill();
  }
  ctx.restore();
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x + PLAYER_W/2, player.y + PLAYER_H/2);
  if (player.dir === -1) ctx.scale(-1, 1);
  if (pandaImg.complete && pandaImg.naturalWidth) {
    ctx.drawImage(pandaImg, -PLAYER_W/2, -PLAYER_H/2, PLAYER_W, PLAYER_H);
  } else {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(0,4,20,22,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0,-16,16,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.ellipse(-11,-28,6,6,-0.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(11,-28,6,6,0.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-6,-17,5,4,-0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6,-17,5,4,0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(-6,-17,2.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,-17,2.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(-5.5,-17,1.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6.5,-17,1.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#555';
    ctx.beginPath(); ctx.ellipse(0,-11,3,2,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.ellipse(-22,2,5,9,-0.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(22,2,5,9,0.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-10,24,7,5,0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(10,24,7,5,-0.3,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawHUD() {
  ctx.font = 'bold 24px Pacifico, cursive';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(232,23,106,0.45)';
  ctx.shadowBlur  = 8;
  ctx.fillText(score, W/2, 44);
  ctx.shadowBlur  = 0;
}

// ═══════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════
function update() {
  if (state !== 'play') return;

  if (touchTargetX !== null) {
    const prevX = player.x;
    player.x  = touchTargetX - PLAYER_W / 2;
    player.vx = player.x - prevX;
  } else {
    let ax = 0;
    if (keys.left)  ax -= 1;
    if (keys.right) ax += 1;
    player.vx = ax * SPEED_X;
    player.x += player.vx;
  }

  player.vy += GRAVITY;
  player.y  += player.vy;

  if (player.vx >  0.1) player.dir =  1;
  if (player.vx < -0.1) player.dir = -1;

  if (player.x + PLAYER_W < 0) player.x = W;
  if (player.x > W)             player.x = -PLAYER_W;

  const MID = H * 0.45;
  if (player.y < MID) {
    const diff = MID - player.y;
    player.y = MID; scrollY += diff;
    for (const p of platforms) p.y += diff;
    score = Math.max(score, Math.round(scrollY / 4));
  }

  for (const p of platforms) {
    if (p.type === 'move') {
      p.x += p.vx;
      if (p.x < 0 || p.x + p.w > W) p.vx *= -1;
    }

    if (p.breakTimer > 0) {
      p.breakTimer++;
      if (p.breakTimer > BREAK_DELAY) {
        p.broken = true;
        p.breakTimer = 0;
      }
    }

    if (p.broken) {
      p.breakAnim += 0.07;
      p.alpha = Math.max(0, 1 - p.breakAnim);
      p.y += 3;
    }
  }

  platforms = platforms.filter(p => p.y < H + 40 && !(p.broken && p.breakAnim >= 1));
  while (platforms.length < PLAT_COUNT + 2) {
  const topY = Math.min(...platforms.map(p => p.y));
  spawnPlatformAt(topY - (50 + Math.random() * MAX_GAP));
}

  // Коллизии
  if (player.vy > 0) {
    for (const p of platforms) {
      if (p.broken || p.breakTimer > 0) continue;

      if (player.x + PLAYER_W - 6 > p.x && player.x + 6 < p.x + p.w &&
          player.y + PLAYER_H > p.y && player.y + PLAYER_H < p.y + p.h + player.vy + 2) {

        player.vy = JUMP_VEL;
        playPop();
       
        if (p.type === 'break') {
          p.breakTimer = 1;
        }

        break;
      }
    }
  }

  if (player.y > H + 20) endGame();
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawBg();
  for (const p of platforms) {
    if (p.y > H + 40 || p.y < -40) continue;
    drawPlatform(p);
  }
  drawPlayer();
  drawHUD();
}

function loop() { update(); render(); animId = requestAnimationFrame(loop); }

// ═══════════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════════
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('over-screen').classList.add('hidden');
  document.getElementById('score-display').classList.add('hidden');
  startMusic();
  generatePlatforms();
  initPlayer();
  state = 'play';
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function endGame() {
  state = 'over';
  best  = Math.max(best, score);
  cancelAnimationFrame(animId);
  document.getElementById('final-score').textContent = score;
  document.getElementById('best-score').textContent  = 'Рекорд: ' + best;
  document.getElementById('over-screen').classList.remove('hidden');
}

// ═══════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft' ||e.key==='a') keys.left =true;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=true;
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft' ||e.key==='a') keys.left =false;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=false;
});

let touchTargetX = null;
function getTouchCanvasX(clientX) {
  const r = canvas.getBoundingClientRect();
  return (clientX - r.left) / canvasScale;
}
canvas.addEventListener('touchstart',  e=>{e.preventDefault();touchTargetX=getTouchCanvasX(e.touches[0].clientX);},{passive:false});
canvas.addEventListener('touchmove',   e=>{e.preventDefault();touchTargetX=getTouchCanvasX(e.touches[0].clientX);},{passive:false});
canvas.addEventListener('touchend',    ()=>{touchTargetX=null;});
canvas.addEventListener('touchcancel', ()=>{touchTargetX=null;});

drawBg();
</script>
